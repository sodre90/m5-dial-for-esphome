name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ESPHome
        run: pip install esphome

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            tests/.esphome
          key: pio-${{ runner.os }}-${{ hashFiles('tests/test.m5-dial.yaml') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Compile test configuration
        run: esphome compile tests/test.m5-dial.yaml
